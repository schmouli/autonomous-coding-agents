volumes:
  n8n_storage:
  postgres_storage:
  qdrant_storage:
  openhands_storage:


networks:
  demo:
    name: mystack_demo    


x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['demo']      
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=http://host.docker.internal:11434
  env_file:
    - path: .env
      required: true


services:

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: postgres
    networks: ['demo']    
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ -z "$(n8n list:workflow --onlyId 2>/dev/null)" ]; then
          n8n import:credentials --separate --input=/demo-data/credentials 2>/dev/null || true
          n8n import:workflow --separate --input=/demo-data/workflows 2>/dev/null || true
        else
          echo "Workflows exist, skipping import"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']    
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    container_name: openhands
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 3000:3000
      - 41234:41234
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands_storage:/.openhands
      - /home/mouli/projects/mortgage-uw:/workspace
    environment:
      - LLM_MODEL=${LLM_MODEL:-openai/qwen2.5-coder:7b}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - SANDBOX_VOLUMES=/home/mouli/projects/mortgage-uw:/workspace:rw
      - WORKSPACE_BASE=/home/mouli/projects/mortgage-uw
      - SANDBOX_VSCODE_PORT=41234
      - SANDBOX_USE_HOST_NETWORK=true        
      - SANDBOX_CONVERSATION_BASE_DIR=/tmp/conversations   
      - SANDBOX_USER_ID=1000
      - DOCKER_HOST_ADDR=127.0.0.1           
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.11.4-python
    depends_on:
      postgres:
        condition: service_healthy
